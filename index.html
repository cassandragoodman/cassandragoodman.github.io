<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cassandra Goodman — Independent Educational Consultant</title>
<meta name="description" content="Personalized, one-on-one guidance through the college search and application process — for students and families who want clarity over pressure.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- React + Babel from CDN: keeps everything in one uploadable file, no build step -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

<style>
:root{
  --ink:#1a1a1a; --ink-soft:#33312c;
  --gold:#b8860b; --gold-bright:#cd9a2a;
  --muted:#6b6b6b; --muted-2:#8d8a82;
  --hair:#e3e0d8; --hair-dark:#3a382f;
  --paper:#ffffff; --canvas:#f2efe8; --canvas-2:#f8f6f0;
  --maxw:1120px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Montserrat',-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink); background:var(--canvas); line-height:1.7; font-weight:400;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden;
}
a{color:inherit;}
.serif{font-family:'Cormorant Garamond',Georgia,serif;}

#loading{ min-height:100vh; display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.4rem; color:var(--muted-2); }

/* ---- shared devices ---- */
.eyebrow{ font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); font-weight:600; }
.section{ max-width:var(--maxw); margin:0 auto; padding:112px 40px; scroll-margin-top:78px; }
.section-head{ max-width:680px; margin-bottom:52px; }
.section-head .eyebrow{ display:block; margin-bottom:14px; }
.section-title{ font-family:'Cormorant Garamond',Georgia,serif; font-weight:500;
  font-size:clamp(2rem,4.4vw,3.05rem); line-height:1.08; letter-spacing:.005em; }
.section-lead{ margin-top:18px; color:var(--muted); font-weight:300; font-size:clamp(1rem,1.6vw,1.16rem); }

.goldrule{ height:2px; background:var(--gold); width:0; transition:width 1100ms cubic-bezier(.16,.8,.2,1); }
.reveal .goldrule{ width:var(--rw,150px); }
.rise{ opacity:0; transform:translateY(22px); transition:opacity 900ms ease, transform 900ms cubic-bezier(.16,.8,.2,1); }
.reveal .rise{ opacity:1; transform:none; }
.reveal .rise.d1{transition-delay:90ms;} .reveal .rise.d2{transition-delay:180ms;}
.reveal .rise.d3{transition-delay:270ms;} .reveal .rise.d4{transition-delay:360ms;}

/* ---- guideline (the signature: a gold thread that fills as you scroll) ---- */
.guideline{ position:fixed; left:34px; top:0; bottom:0; width:1px; background:var(--hair); z-index:5; }
.guideline-fill{ width:1px; background:var(--gold); position:relative; will-change:height; }
.guideline-node{ position:absolute; left:50%; bottom:-4px; width:8px; height:8px; border-radius:50%;
  background:var(--gold); transform:translateX(-50%); box-shadow:0 0 0 4px rgba(184,134,11,.14); }

/* ---- header ---- */
.header{ position:fixed; inset:0 0 auto 0; z-index:50; display:flex; align-items:center; justify-content:space-between;
  padding:18px 40px; border-bottom:1px solid transparent; transition:background .4s ease,border-color .4s ease,padding .4s ease; }
.header.scrolled{ background:rgba(242,239,232,.92); backdrop-filter:saturate(140%) blur(8px); border-bottom:1px solid var(--hair); padding:13px 40px; }
.brand{ display:flex; flex-direction:column; line-height:1; text-decoration:none; }
.brand .bn{ font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:500; letter-spacing:.01em; }
.brand .bt{ font-size:8px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted-2); margin-top:4px; }
.nav{ display:flex; gap:30px; align-items:center; }
.nav a{ font-size:12px; letter-spacing:.13em; text-transform:uppercase; font-weight:500; text-decoration:none; color:var(--ink); position:relative; padding:4px 0; }
.nav a::after{ content:''; position:absolute; left:0; bottom:-2px; height:1.5px; width:0; background:var(--gold); transition:width .26s ease; }
.nav a:hover::after, .nav a:focus-visible::after, .nav a.active::after{ width:100%; }
.nav a.cta{ border:1px solid var(--ink); padding:9px 18px; transition:background .22s ease,color .22s ease; }
.nav a.cta::after{ display:none; }
.nav a.cta:hover, .nav a.cta:focus-visible{ background:var(--ink); color:var(--canvas); }
.menu-btn{ display:none; background:none; border:0; cursor:pointer; padding:8px; z-index:60; }
.menu-btn span{ display:block; width:24px; height:1.6px; background:var(--ink); margin:5px 0; transition:transform .3s ease,opacity .3s ease; }
.menu-btn.open span:nth-child(1){ transform:translateY(6.6px) rotate(45deg); }
.menu-btn.open span:nth-child(2){ opacity:0; }
.menu-btn.open span:nth-child(3){ transform:translateY(-6.6px) rotate(-45deg); }

/* ---- hero ---- */
.hero{ min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:140px 24px 90px; position:relative; }
.plate{ max-width:760px; }
.frame{ height:1px; background:var(--hair); margin:0 auto; max-width:340px; }
.hero .eyebrow{ margin:26px 0 22px; display:block; }
.hero-name{ font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(2.9rem,9vw,5.7rem); line-height:.98; letter-spacing:.01em; }
.hero-bar{ height:2.5px; background:var(--gold); margin:22px auto 18px; width:0; }
.hero-tag{ font-size:clamp(10px,1.4vw,12.5px); letter-spacing:.26em; text-transform:uppercase; color:#555; }
.hero-lead{ margin:46px auto 0; max-width:540px; font-weight:300; color:var(--ink-soft); font-size:clamp(1.02rem,1.9vw,1.22rem); line-height:1.65; }
.hero-actions{ margin-top:38px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
.btn{ display:inline-block; text-decoration:none; cursor:pointer; font-size:12px; letter-spacing:.15em; text-transform:uppercase; font-weight:600;
  padding:14px 28px; border:1px solid var(--ink); background:transparent; color:var(--ink); transition:background .24s ease,color .24s ease,border-color .24s ease; }
.btn-solid{ background:var(--ink); color:var(--canvas); }
.btn-solid:hover, .btn-solid:focus-visible{ background:var(--gold); border-color:var(--gold); color:#fff; }
.btn-ghost:hover, .btn-ghost:focus-visible{ background:var(--ink); color:var(--canvas); }
.scroll-hint{ position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted-2); }

/* hero load animation */
@keyframes riseIn{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
@keyframes barDraw{ from{width:0} to{width:var(--bw,280px)} }
.hero .anim{ opacity:0; animation:riseIn .9s cubic-bezier(.16,.8,.2,1) forwards; }
.hero .a1{animation-delay:.15s;} .hero .a2{animation-delay:.35s;} .hero .a3{animation-delay:.85s;}
.hero .a4{animation-delay:1.05s;} .hero .a5{animation-delay:1.25s;} .hero .a6{animation-delay:1.45s;}
.hero-bar.anim{ animation:barDraw 1s cubic-bezier(.16,.8,.2,1) forwards; animation-delay:.6s; opacity:1; }

/* ---- approach ---- */
.approach{ background:var(--paper); }
.approach-grid{ display:grid; grid-template-columns:1fr 1.15fr; gap:64px; align-items:start; }
.approach-body p{ color:var(--ink-soft); font-weight:300; font-size:1.06rem; margin-bottom:20px; }
.approach-body p.lead-line{ color:var(--ink); font-weight:400; }
.pull{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400; font-size:clamp(1.5rem,3vw,2.05rem); line-height:1.3; color:var(--ink); }
.pull .em{ color:var(--gold); font-style:normal; }

/* ---- services (expandable) ---- */
.services-grid{ display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid var(--hair); }
.svc{ border-bottom:1px solid var(--hair); border-right:1px solid var(--hair); display:flex; flex-direction:column; }
.svc:nth-child(3n){ border-right:0; }
.svc-head{ width:100%; text-align:left; background:none; border:0; cursor:pointer; padding:40px 32px 22px; font:inherit; color:inherit; transition:background .3s ease; }
.svc-head:hover{ background:var(--canvas-2); }
.svc .n{ font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--gold); letter-spacing:.04em; }
.svc h3{ font-family:'Cormorant Garamond',serif; font-weight:500; font-size:1.7rem; margin:12px 0 4px; line-height:1.15; }
.svc .meta{ font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted-2); font-weight:600; margin-bottom:16px; }
.svc p{ font-size:.97rem; font-weight:300; color:var(--muted); }
.svc-toggle{ display:flex; align-items:center; gap:8px; margin-top:18px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:600; color:var(--ink); }
.svc-toggle .pm{ display:inline-flex; width:18px; height:18px; align-items:center; justify-content:center; border:1px solid var(--gold); color:var(--gold); border-radius:50%; font-size:13px; line-height:1; transition:transform .3s ease,background .3s ease,color .3s ease; }
.svc.open .svc-toggle .pm{ transform:rotate(45deg); background:var(--gold); color:#fff; }
.svc-panel{ overflow:hidden; max-height:0; transition:max-height .42s cubic-bezier(.16,.8,.2,1); }
.svc.open .svc-panel{ max-height:340px; }
.svc-panel ul{ list-style:none; padding:0 32px 36px; }
.svc-panel li{ position:relative; padding:7px 0 7px 20px; font-size:.93rem; font-weight:300; color:var(--ink-soft); border-top:1px solid var(--hair); }
.svc-panel li:first-child{ border-top:0; }
.svc-panel li::before{ content:''; position:absolute; left:0; top:16px; width:7px; height:1.5px; background:var(--gold); }

/* ---- process (spine connecting steps) ---- */
.process{ background:var(--canvas-2); }
.steps{ position:relative; }
.steps::before{ content:''; position:absolute; left:11px; top:8px; bottom:8px; width:1px; background:var(--hair); }
.step{ position:relative; padding:0 0 38px 56px; }
.step:last-child{ padding-bottom:0; }
.step .dotmark{ position:absolute; left:4px; top:4px; width:16px; height:16px; border-radius:50%; background:var(--canvas-2); border:2px solid var(--gold); }
.step .num{ font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--gold); letter-spacing:.1em; }
.step h3{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1.5rem; margin:2px 0 8px; }
.step p{ font-size:.97rem; font-weight:300; color:var(--muted); max-width:560px; }

/* ---- audience ---- */
.audience{ background:var(--paper); }
.aud-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:40px; }
.aud-item .k{ font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:500; line-height:1; }
.aud-item .k .em{ color:var(--gold); }
.aud-item .v{ margin-top:12px; font-size:.95rem; font-weight:300; color:var(--muted); }

/* ---- testimonials ---- */
.testi{ background:var(--canvas-2); }
.testi .section{ text-align:center; }
.testi .eyebrow{ display:block; margin-bottom:30px; }
.testi-quote{ font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(1.5rem,3.4vw,2.3rem); line-height:1.34; color:var(--ink); max-width:760px; margin:0 auto; min-height:2.7em; transition:opacity .5s ease; }
.testi-quote.fade{ opacity:0; }
.testi-quote .mark{ color:var(--gold); }
.testi-attr{ margin-top:26px; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted-2); font-weight:600; transition:opacity .5s ease; }
.testi-attr.fade{ opacity:0; }
.testi-dots{ display:flex; gap:10px; justify-content:center; margin-top:34px; }
.testi-dots button{ width:8px; height:8px; border-radius:50%; border:1px solid var(--gold); background:transparent; padding:0; cursor:pointer; transition:background .3s ease; }
.testi-dots button.on{ background:var(--gold); }
.placeholder-flag{ display:inline-block; margin-top:30px; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#a13226; background:#faece9; border:1px solid #eccfc9; padding:6px 12px; }

/* ---- faq ---- */
.faq{ background:var(--paper); }
.faq-list{ border-top:1px solid var(--hair); max-width:860px; }
.faq-item{ border-bottom:1px solid var(--hair); }
.faq-q{ width:100%; text-align:left; background:none; border:0; cursor:pointer; font:inherit; color:inherit;
  display:flex; justify-content:space-between; align-items:center; gap:24px; padding:26px 4px; }
.faq-q span.q{ font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:500; line-height:1.25; }
.faq-q .pm{ flex:0 0 auto; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--gold); color:var(--gold); border-radius:50%; font-size:15px; transition:transform .32s ease,background .32s ease,color .32s ease; }
.faq-item.open .faq-q .pm{ transform:rotate(45deg); background:var(--gold); color:#fff; }
.faq-a{ overflow:hidden; max-height:0; transition:max-height .42s cubic-bezier(.16,.8,.2,1); }
.faq-item.open .faq-a{ max-height:320px; }
.faq-a p{ padding:0 4px 28px; color:var(--ink-soft); font-weight:300; font-size:1.02rem; max-width:720px; }

/* ---- contact ---- */
.contact{ background:var(--ink); color:#f4f1ea; }
.contact .section{ display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start; }
.contact .eyebrow{ color:var(--gold-bright); display:block; margin-bottom:14px; }
.contact h2{ font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(2rem,4.4vw,3rem); line-height:1.05; color:#fff; }
.contact .c-bar{ height:2px; width:90px; background:var(--gold); margin:22px 0; }
.contact .c-lead{ color:#d9d4c8; font-weight:300; font-size:1.06rem; max-width:420px; }
.contact .c-email{ display:inline-block; margin-top:26px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.5rem;
  color:#fff; text-decoration:none; border-bottom:1px solid var(--gold); padding-bottom:3px; transition:color .24s ease; }
.contact .c-email:hover, .contact .c-email:focus-visible{ color:var(--gold-bright); }
.form .field{ margin-bottom:20px; }
.form label{ display:block; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#b9b3a4; font-weight:600; margin-bottom:8px; }
.form input, .form select, .form textarea{ width:100%; background:transparent; border:0; border-bottom:1px solid #4a4840; color:#fff;
  font:inherit; font-size:1rem; font-weight:300; padding:9px 2px; transition:border-color .24s ease; }
.form select{ color:#d9d4c8; }
.form select option{ color:#1a1a1a; }
.form textarea{ resize:vertical; min-height:96px; }
.form input:focus, .form select:focus, .form textarea:focus{ outline:none; border-color:var(--gold); }
.form .err{ display:block; margin-top:7px; font-size:11px; letter-spacing:.04em; color:#e9a79c; text-transform:none; font-weight:400; }
.form .submit{ margin-top:8px; border:1px solid var(--gold); background:var(--gold); color:#fff; padding:14px 30px;
  font-size:12px; letter-spacing:.15em; text-transform:uppercase; font-weight:600; cursor:pointer; transition:background .24s ease,color .24s ease; }
.form .submit:hover{ background:transparent; color:var(--gold-bright); }
.form .sent{ margin-top:18px; font-size:.95rem; font-weight:300; color:#bfe0b8; }
.form .hint{ margin-top:14px; font-size:11px; color:#8b8676; line-height:1.6; }

/* ---- footer ---- */
.footer{ background:var(--ink); color:#8b8676; }
.footer-inner{ max-width:var(--maxw); margin:0 auto; padding:26px 40px; border-top:1px solid var(--hair-dark);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; font-size:11px; letter-spacing:.08em; }
.footer-inner a{ color:#b3ae9e; text-decoration:none; }
.footer-inner a:hover{ color:var(--gold-bright); }

:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

@media (prefers-reduced-motion:reduce){
  html{ scroll-behavior:auto; }
  .rise,.goldrule{ transition:none !important; opacity:1 !important; transform:none !important; }
  .hero .anim{ animation:none !important; opacity:1 !important; }
  .hero-bar.anim{ animation:none !important; width:var(--bw,280px) !important; }
}

@media (max-width:900px){
  .guideline{ display:none; }
  .approach-grid{ grid-template-columns:1fr; gap:36px; }
  .services-grid{ grid-template-columns:1fr; }
  .svc{ border-right:0; }
  .svc.open .svc-panel{ max-height:380px; }
  .aud-grid{ grid-template-columns:1fr; gap:26px; }
  .contact .section{ grid-template-columns:1fr; gap:44px; }
}
@media (max-width:680px){
  .section{ padding:74px 24px; }
  .header{ padding:14px 22px; } .header.scrolled{ padding:12px 22px; }
  .nav{ position:fixed; inset:0 0 0 auto; width:min(78%,320px); flex-direction:column; align-items:flex-start; justify-content:center;
    gap:26px; background:var(--canvas); padding:40px; transform:translateX(100%); transition:transform .36s cubic-bezier(.16,.8,.2,1); box-shadow:-20px 0 60px rgba(0,0,0,.08); }
  .nav.open{ transform:translateX(0); }
  .nav a{ font-size:15px; }
  .menu-btn{ display:block; }
}
</style>
</head>
<body>
<div id="root"><div id="loading">Setting the page…</div></div>
<noscript><p style="padding:40px;text-align:center;">This site needs JavaScript enabled to display.</p></noscript>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const EMAIL = "cassandragoodman77@gmail.com";

/* reveal-on-scroll wrapper */
function Reveal({ children, className = "", id }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(REDUCE);
  useEffect(() => {
    if (REDUCE) return;
    const el = ref.current;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVis(true); io.unobserve(el); }
    }, { threshold: 0.15, rootMargin: "0px 0px -8% 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return <div ref={ref} id={id} className={className + (vis ? " reveal" : "")}>{children}</div>;
}

/* the guideline: gold thread that fills with scroll progress */
function Guideline() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const d = document.documentElement;
      const max = d.scrollHeight - d.clientHeight;
      setP(max > 0 ? Math.min(1, window.scrollY / max) : 0);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => { window.removeEventListener("scroll", onScroll); window.removeEventListener("resize", onScroll); };
  }, []);
  return (
    <div className="guideline" aria-hidden="true">
      <div className="guideline-fill" style={{ height: (p * 100) + "%" }}>
        <span className="guideline-node"></span>
      </div>
    </div>
  );
}

function Header() {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);
  const [active, setActive] = useState("");
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 24);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    const ids = ["approach", "services", "process", "faq", "contact"];
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin: "-45% 0px -50% 0px" });
    ids.forEach((id) => { const el = document.getElementById(id); if (el) io.observe(el); });
    return () => { window.removeEventListener("scroll", onScroll); io.disconnect(); };
  }, []);
  const links = [
    ["approach", "Approach"], ["services", "Services"],
    ["process", "Process"], ["faq", "FAQ"]
  ];
  const go = () => setOpen(false);
  return (
    <header className={"header" + (scrolled ? " scrolled" : "")}>
      <a className="brand" href="#top" onClick={go}>
        <span className="bn">Cassandra Goodman</span>
        <span className="bt">Independent Educational Consultant</span>
      </a>
      <button className={"menu-btn" + (open ? " open" : "")} aria-label={open ? "Close menu" : "Open menu"}
        aria-expanded={open} onClick={() => setOpen(!open)}>
        <span></span><span></span><span></span>
      </button>
      <nav className={"nav" + (open ? " open" : "")} aria-label="Primary">
        {links.map(([id, label]) => (
          <a key={id} href={"#" + id} className={active === id ? "active" : ""} onClick={go}>{label}</a>
        ))}
        <a href="#contact" className="cta" onClick={go}>Get in touch</a>
      </nav>
    </header>
  );
}

function Hero() {
  const cls = (extra) => (REDUCE ? extra : "anim " + extra);
  return (
    <section className="hero" id="hero">
      <div className="plate">
        <div className={cls("a1")}><div className="frame"></div></div>
        <span className={"eyebrow " + cls("a1")}>Guiding students to the right fit</span>
        <h1 className={"hero-name " + cls("a2")}>Cassandra Goodman</h1>
        <div className={"hero-bar " + (REDUCE ? "" : "anim")} style={{ "--bw": "280px", width: REDUCE ? "280px" : undefined }}></div>
        <div className={"hero-tag " + cls("a3")}>Independent Educational Consultant</div>
        <div className={cls("a4")}><div className="frame" style={{ marginTop: "26px" }}></div></div>
        <p className={"hero-lead " + cls("a5")}>Personalized, one-on-one guidance through the college search

function Contact() {
  const [form, setForm] = useState({ name: "", email: "", grade: "", message: "" });
  const [errs, setErrs] = useState({});
  const [sent, setSent] = useState(false);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const validate = () => {
    const er = {};
    if (!form.name.trim()) er.name = "Please add your name.";
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(form.email)) er.email = "Please add a valid email.";
    if (!form.message.trim()) er.message = "A short note helps me prepare.";
    setErrs(er);
    return Object.keys(er).length === 0;
  };
  const submit = (e) => {
    e.preventDefault();
    if (!validate()) return;
    const subject = encodeURIComponent("Consultation inquiry — " + form.name);
    const body = encodeURIComponent(
      "Name: " + form.name + "\nEmail: " + form.email +
      "\nStudent's grade: " + (form.grade || "Not specified") + "\n\n" + form.message
    );
    window.location.href = "mailto:" + EMAIL + "?subject=" + subject + "&body=" + body;
    setSent(true);
  };
  return (
    <section className="contact" id="contact">
      <Reveal className="section">
        <div className="rise">
          <span className="eyebrow">Let's begin</span>
          <h2 className="serif">Tell me about<br />your student</h2>
          <div className="c-bar"></div>
          <p className="c-lead">Share where you are in the process and what you're hoping for.
            I'll follow up to set up a first conversation.</p>
          <a className="c-email" href={"mailto:" + EMAIL}>{EMAIL}</a>
        </div>
        <form className="form rise d1" onSubmit={submit} noValidate>
          <div className="field">
            <label htmlFor="f-name">Your name</label>
            <input id="f-name" type="text" value={form.name} onChange={set("name")} />
            {errs.name && <span className="err">{errs.name}</span>}
          </div>
          <div className="field">
            <label htmlFor="f-email">Email</label>
            <input id="f-email" type="email" value={form.email} onChange={set("email")} />
            {errs.email && <span className="err">{errs.email}</span>}
          </div>
          <div className="field">
            <label htmlFor="f-grade">Student's grade</label>
            <select id="f-grade" value={form.grade} onChange={set("grade")}>
              <option value="">Select one</option>
              <option>9th grade</option><option>10th grade</option>
              <option>11th grade</option><option>12th grade</option>
              <option>Transfer student</option><option>Other</option>
            </select>
          </div>
          <div className="field">
            <label htmlFor="f-msg">A short message</label>
            <textarea id="f-msg" value={form.message} onChange={set("message")}></textarea>
            {errs.message && <span className="err">{errs.message}</span>}
          </div>
          <button type="submit" className="submit">Send inquiry</button>
          {sent && <p className="sent">Thanks — your email app should open with the message ready to send.</p>}
          <p className="hint">Submitting opens your email app with the details filled in. Prefer email? Write to {EMAIL} directly.</p>
        </form>
      </Reveal>
    </section>
  );
}
